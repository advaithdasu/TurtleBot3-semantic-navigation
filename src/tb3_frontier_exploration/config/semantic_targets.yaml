# ============================================================
# semantic_targets.yaml — Canonical semantic object registry
# ============================================================
#
# Single source of truth for the three naming layers used in this project:
#
#   semantic_name    Human-facing label. Used by the NLP command parser
#                    (command_parser.py) and semantic_goals.yaml.
#                    This is what a user says: "go to the table".
#
#   detector_label   YOLO / COCO class string. Used in detector.yaml
#                    class_filter. This is what YOLOv8 outputs.
#                    NEVER confuse with semantic_name — they may differ
#                    (e.g. semantic "table" ↔ YOLO "bench").
#
#   gazebo_model     Directory name under ~/.gazebo/models used in
#                    Gazebo world files via model:// URI.
#                    This is a simulation-only field; irrelevant at runtime.
#
# Validation status: all three objects confirmed detectable in Gazebo
# simulation with YOLOv8n (detector_test.world, April 2026).
#
# To disable an object without deleting it: set enabled: false.
# The command parser and semantic_goals.yaml read only enabled entries.
# ============================================================

semantic_targets:

  - semantic_name:   "table"
    detector_label:  "bench"
    gazebo_model:    "table_marble"
    enabled:         true
    notes: >
      YOLOv8 classifies the marble/wooden table as "bench" (COCO class 13).
      The semantic_name is "table" for natural command phrasing.
      Do NOT use "dining table" (COCO class 60) — not detected reliably
      for this model in simulation.

  - semantic_name:   "stop_sign"
    detector_label:  "stop sign"
    gazebo_model:    "stop_sign"
    enabled:         false  # temporarily disabled for 2-target testing
    notes: >
      semantic_name uses underscore form "stop_sign" for consistency.
      detector_label remains "stop sign" (COCO label with space).
      Replaces old "traffic light" / "stop_light" (broken materials).
      Gazebo model "stop_sign" found in ~/.gazebo/models.

  - semantic_name:   "person"
    detector_label:  "person"
    gazebo_model:    "person_standing"
    enabled:         true
    notes: >
      Direct label match. Highest detection confidence of the three targets.
      Optimise scene layout to place person centred in camera FOV first.
