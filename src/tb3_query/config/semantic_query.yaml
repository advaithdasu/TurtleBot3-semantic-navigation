# ============================================================
# tb3_query — semantic_query_node configuration
# ============================================================
# Stage-4 semantic query: resolve text commands against semantic
# memory to select a navigation target.
#
# See semantic_targets.yaml for the canonical name mapping
# (semantic_name <-> detector_label <-> gazebo_model).

semantic_query_node:
  ros__parameters:
    # ── Topics ────────────────────────────────────────────
    memory_topic:  "/semantic_map_memory_node/landmark_objects"  # persistent landmarks in map frame
    command_topic: "~/command"        # -> /semantic_query_node/command
    output_topic:  "~/selected_target"  # -> /semantic_query_node/selected_target
    status_topic:  "~/query_status"     # -> /semantic_query_node/query_status

    # ── Mapping ───────────────────────────────────────────
    # Path to semantic_targets.yaml. Empty = auto-resolve from
    # tb3_frontier_exploration package share.
    semantic_targets_file: ""

    # ── Output ────────────────────────────────────────────
    output_frame: "map"  # persistent landmarks are in map frame

    # ── Grounding ─────────────────────────────────────────
    # Attribute queries ("go to the sofa with warm color") are resolved
    # against grounding/server.py using the best-view frames stored by
    # evidence_store_node. If the server or evidence is unavailable they
    # degrade to plain nearest-first selection.
    grounding_enabled: true
    grounding_server_url: "http://127.0.0.1:8801"
    grounding_timeout_sec: 20.0
    # Must match evidence_dir in tb3_grounding/config/grounding.yaml.
    evidence_dir: "~/.tb3_semantic_nav/evidence"
    # Floor on IoU x box-score for accepting a grounded match; below it
    # the query fails rather than guessing.
    min_grounding_score: 0.05
